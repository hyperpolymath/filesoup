# eclexiaiser manifest — energy/carbon resource budgets
# SPDX-License-Identifier: PMPL-1.0-or-later

[project]
name = "file-soup"

[[functions]]
name = "scan"
source = "crates/fslint-cli/src/commands.rs"
energy-budget-mj = 55.0
carbon-budget-mg = 11.0

[[functions]]
name = "list_plugins"
source = "crates/fslint-cli/src/commands.rs"
energy-budget-mj = 5.0
carbon-budget-mg = 1.0

[carbon]
provider = "static"
region = "GB"
static-intensity = 200.0

[report]
format = "text"
include-recommendations = true
